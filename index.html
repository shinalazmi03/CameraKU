<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS Cam Pro - Drive Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .video-container {
            position: relative;
            width: 100%;
            max-width: 640px;
            margin: 0 auto;
            border-radius: 1rem;
            overflow: hidden;
            background: #000;
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #videoFeed { width: 100%; height: auto; display: block; }
        .mirror { transform: scaleX(-1); }
        #capturedCanvas { display: none; }
        .status-dot { height: 8px; width: 8px; border-radius: 50%; display: inline-block; }
        .overlay-step {
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.98);
            z-index: 40;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col items-center p-4">

    <header class="w-full max-w-2xl mb-4 text-center">
        <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent">
            GPS Cam Pro (Drive Sync)
        </h1>
    </header>

    <main class="w-full max-w-2xl space-y-4">
        <div class="video-container shadow-2xl border-2 border-slate-700">
            
            <!-- STEP 1: Login Nomor Plat -->
            <div id="stepLogin" class="overlay-step">
                <div class="mb-4 text-emerald-400">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="10" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                </div>
                <h2 class="text-xl font-bold mb-2">Input Identitas</h2>
                <p class="text-slate-400 text-sm mb-6">Masukkan Nomor Plat untuk penamaan file di Google Drive</p>
                <input type="text" id="inputPlat" placeholder="Contoh: B 1234 AB" class="w-full max-w-xs bg-slate-800 border border-slate-600 rounded-xl px-4 py-3 text-center text-xl font-bold uppercase tracking-widest focus:outline-none focus:border-emerald-500 mb-4 text-white">
                <button id="btnProceed" class="bg-emerald-600 hover:bg-emerald-500 px-10 py-3 rounded-xl font-bold transition-all active:scale-95">Lanjut</button>
            </div>

            <!-- STEP 2: Izin Akses -->
            <div id="stepIzin" class="overlay-step hidden">
                <div class="mb-4 text-blue-500">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
                </div>
                <h2 class="text-xl font-bold mb-2">Aktifkan Sensor</h2>
                <p class="text-slate-400 text-sm mb-6">Aplikasi butuh akses Kamera & GPS</p>
                <button id="btnStartApp" class="bg-blue-600 hover:bg-blue-500 px-10 py-3 rounded-xl font-bold transition-all active:scale-95">Aktifkan Sekarang</button>
            </div>

            <video id="videoFeed" autoplay playsinline></video>
            
            <div id="previewContainer" class="absolute inset-0 hidden bg-black">
                <img id="resultImage" class="w-full h-full object-contain" src="" alt="Hasil">
            </div>
            
            <!-- Overlay Alamat -->
            <div class="absolute bottom-3 left-3 right-3 bg-black/60 backdrop-blur-md p-2 rounded-lg text-[10px] pointer-events-none border border-white/10">
                <div class="flex items-center gap-2 mb-1">
                    <span id="gpsStatusDot" class="status-dot bg-red-500"></span>
                    <span id="gpsStatusText" class="uppercase font-bold text-white">MENCARI GPS...</span>
                    <span class="ml-auto text-emerald-400 font-bold" id="displayPlat">--</span>
                </div>
                <div id="addressDisplay" class="text-slate-200 leading-tight">Mendapatkan alamat...</div>
            </div>
        </div>

        <!-- Tombol Kontrol -->
        <div id="controlsGroup" class="flex flex-wrap justify-center gap-3 opacity-30 pointer-events-none">
            <button id="btnCapture" class="bg-blue-600 hover:bg-blue-700 px-8 py-3 rounded-full font-bold flex items-center gap-2 shadow-lg active:scale-95">
                FOTO
            </button>
            <button id="btnRetake" class="hidden bg-slate-700 hover:bg-slate-600 px-8 py-3 rounded-full font-bold">ULANG</button>
            <button id="btnSend" class="hidden bg-emerald-600 hover:bg-emerald-700 px-8 py-3 rounded-full font-bold flex items-center gap-2 shadow-lg">KIRIM KE DRIVE</button>
        </div>

        <!-- Logs -->
        <div class="bg-slate-800/80 rounded-xl p-3 text-[10px] font-mono border border-slate-700 shadow-inner">
            <div id="logEntries" class="space-y-0.5 h-20 overflow-y-auto text-blue-300">
                <div>> Masukkan nomor plat untuk memulai.</div>
            </div>
        </div>
    </main>

    <canvas id="capturedCanvas"></canvas>

    <div id="modal" class="fixed inset-0 bg-black/90 hidden items-center justify-center p-6 z-50">
        <div class="bg-slate-800 p-6 rounded-2xl max-w-sm w-full text-center border border-slate-700 shadow-2xl">
            <div id="modalIcon" class="mb-4 text-5xl">✅</div>
            <h3 id="modalTitle" class="text-lg font-bold mb-2">Status</h3>
            <p id="modalMsg" class="text-slate-400 mb-6 text-sm"></p>
            <button onclick="closeModal()" class="w-full bg-blue-600 py-3 rounded-xl font-bold">Tutup</button>
        </div>
    </div>

    <script>
        // MASUKKAN URL GOOGLE APPS SCRIPT ANDA DI SINI
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwAQKIJJVS3NvBNgqRePDXyNO6OuvUN9ddNus7Vms9D_vyKu3S-zSlAdriNAmE_VJGr/exec"; 

        const video = document.getElementById('videoFeed');
        const canvas = document.getElementById('capturedCanvas');
        const resultImg = document.getElementById('resultImage');
        const previewContainer = document.getElementById('previewContainer');
        const logEntries = document.getElementById('logEntries');
        const addressDisplay = document.getElementById('addressDisplay');
        const gpsStatusDot = document.getElementById('gpsStatusDot');
        const gpsStatusText = document.getElementById('gpsStatusText');
        const stepLogin = document.getElementById('stepLogin');
        const stepIzin = document.getElementById('stepIzin');
        const controlsGroup = document.getElementById('controlsGroup');

        let currentCoords = { lat: 0, lng: 0, accuracy: 0 };
        let fullAddress = "Alamat tidak ditemukan";
        let nomorPlat = "";
        let stream = null;

        function addLog(msg, type = 'info') {
            const entry = document.createElement('div');
            entry.className = type === 'error' ? 'text-red-400' : (type === 'success' ? 'text-emerald-400' : 'text-blue-300');
            entry.textContent = `> ${msg}`;
            logEntries.prepend(entry);
        }

        // --- STEP 1: Login ---
        document.getElementById('btnProceed').onclick = () => {
            const val = document.getElementById('inputPlat').value.trim();
            if (!val) return showModal('⚠️', 'Input Kosong', 'Harap masukkan Nomor Plat kendaraan.');
            nomorPlat = val.toUpperCase();
            document.getElementById('displayPlat').textContent = nomorPlat;
            stepLogin.classList.add('hidden');
            stepIzin.classList.remove('hidden');
            addLog(`Nomor Plat: ${nomorPlat}`);
        };

        // --- STEP 2: Kamera & GPS ---
        document.getElementById('btnStartApp').onclick = async () => {
            addLog('Mengaktifkan kamera...');
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: { ideal: 'environment' } }, 
                    audio: false 
                });
                video.srcObject = stream;
                
                const settings = stream.getVideoTracks()[0].getSettings();
                if (settings.facingMode === 'user' || !settings.facingMode) video.classList.add('mirror');

                initGPS();
                stepIzin.classList.add('hidden');
                controlsGroup.classList.remove('opacity-30', 'pointer-events-none');
                addLog('Kamera aktif.', 'success');
            } catch (err) {
                showModal('❌', 'Error', 'Gagal akses kamera: ' + err.message);
            }
        };

        function initGPS() {
            if (!navigator.geolocation) return addLog('GPS tidak didukung.', 'error');
            navigator.geolocation.watchPosition(async (pos) => {
                currentCoords = {
                    lat: pos.coords.latitude,
                    lng: pos.coords.longitude,
                    accuracy: pos.coords.accuracy.toFixed(1)
                };
                gpsStatusDot.className = 'status-dot bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.5)]';
                gpsStatusText.textContent = `GPS: OK (${currentCoords.accuracy}m)`;
                
                // Ambil Alamat (Reverse Geocoding)
                fetchAddress(currentCoords.lat, currentCoords.lng);
            }, (err) => {
                addLog('GPS Error: ' + err.message, 'error');
                gpsStatusDot.className = 'status-dot bg-red-500';
            }, { enableHighAccuracy: true });
        }

        async function fetchAddress(lat, lng) {
            try {
                // Menggunakan Nominatim API (OpenStreetMap) - Free
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=18&addressdetails=1`);
                const data = await res.json();
                
                const addr = data.address;
                const road = addr.road || addr.suburb || "";
                const village = addr.village || addr.hamlet || addr.suburb || "";
                const district = addr.city_district || addr.county || "";
                const city = addr.city || addr.regency || addr.state_district || "";
                const state = addr.state || "";

                fullAddress = `${road}, ${village}, ${district}, ${city}, ${state}`.replace(/(, )+/g, ', ').trim();
                if (fullAddress.startsWith(',')) fullAddress = fullAddress.substring(1).trim();
                
                addressDisplay.textContent = fullAddress;
            } catch (e) {
                addressDisplay.textContent = `${lat.toFixed(5)}, ${lng.toFixed(5)} (Gagal ambil nama jalan)`;
            }
        }

        // --- STEP 3: Foto & Kirim ---
        document.getElementById('btnCapture').onclick = () => {
            const w = video.videoWidth;
            const h = video.videoHeight;
            canvas.width = w;
            canvas.height = h;
            const ctx = canvas.getContext('2d');
            
            if (video.classList.contains('mirror')) { ctx.translate(w, 0); ctx.scale(-1, 1); }
            ctx.drawImage(video, 0, 0, w, h);
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            
            const fontSize = Math.max(16, Math.floor(w / 35));
            ctx.font = `bold ${fontSize}px sans-serif`;
            
            const lines = [
                `PLAT   : ${nomorPlat}`,
                `ALAMAT : ${fullAddress}`,
                `WAKTU  : ${new Date().toLocaleString('id-ID')}`,
                `KOORD  : ${currentCoords.lat.toFixed(6)}, ${currentCoords.lng.toFixed(6)}`
            ];

            // Wrap Text if address is too long
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            const boxH = (lines.length * (fontSize + 12)) + 40;
            ctx.fillRect(0, h - boxH, w, boxH);
            ctx.fillStyle = '#10b981';
            ctx.fillRect(0, h - boxH, 8, boxH);
            ctx.fillStyle = '#ffffff';
            lines.forEach((l, i) => ctx.fillText(l, 25, h - boxH + 30 + (i * (fontSize + 12))));

            resultImg.src = canvas.toDataURL('image/jpeg', 0.8);
            previewContainer.classList.remove('hidden');
            document.getElementById('btnCapture').classList.add('hidden');
            document.getElementById('btnRetake').classList.remove('hidden');
            document.getElementById('btnSend').classList.remove('hidden');
        };

        document.getElementById('btnRetake').onclick = () => {
            previewContainer.classList.add('hidden');
            document.getElementById('btnCapture').classList.remove('hidden');
            document.getElementById('btnRetake').classList.add('hidden');
            document.getElementById('btnSend').classList.add('hidden');
        };

        document.getElementById('btnSend').onclick = async () => {
            const btn = document.getElementById('btnSend');
            btn.disabled = true;
            btn.innerHTML = 'Sedang Mengunggah...';
            addLog('Menyiapkan file & data...');

            const base64Data = resultImg.src.split(',')[1];
            
            try {
                // Kirim ke Google Apps Script
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({
                        plat: nomorPlat,
                        address: fullAddress,
                        lat: currentCoords.lat,
                        lng: currentCoords.lng,
                        image: base64Data, // Kirim gambar
                        timestamp: new Date().toLocaleString('id-ID')
                    })
                });

                showModal('✅', 'Berhasil!', `Foto ${nomorPlat} telah tersimpan di Google Drive & Sheets.`);
                document.getElementById('btnRetake').click();
            } catch (err) {
                showModal('❌', 'Gagal', err.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'KIRIM KE DRIVE';
            }
        };

        function showModal(icon, title, msg) {
            document.getElementById('modalIcon').textContent = icon;
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalMsg').textContent = msg;
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('modal').classList.add('flex');
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
            document.getElementById('modal').classList.remove('flex');
        }
    </script>
</body>
</html>
