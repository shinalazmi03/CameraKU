<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS Cam Pro - Drive Sync Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .video-container {
            position: relative;
            width: 100%;
            max-width: 640px;
            margin: 0 auto;
            border-radius: 1.5rem;
            overflow: hidden;
            background: #000;
            min-height: 350px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #334155;
        }
        #videoFeed { width: 100%; height: auto; display: block; }
        .mirror { transform: scaleX(-1); }
        #capturedCanvas { display: none; }
        .status-dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; }
        .overlay-step {
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.98);
            z-index: 50;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col items-center p-4">

    <header class="w-full max-w-2xl mb-6 text-center">
        <h1 class="text-3xl font-extrabold bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent italic">
            GPS CAM PRO
        </h1>
        <p class="text-slate-500 text-[11px] mt-1 uppercase tracking-widest font-bold">Secure Cloud Storage Sync</p>
    </header>

    <main class="w-full max-w-2xl space-y-5">
        <div class="video-container shadow-2xl">
            
            <!-- STEP 1: Input Identitas -->
            <div id="stepLogin" class="overlay-step">
                <div class="mb-6 p-4 bg-emerald-500/10 rounded-full text-emerald-400">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="10" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                </div>
                <h2 class="text-2xl font-bold mb-2">Input Nomor Plat</h2>
                <p class="text-slate-400 text-sm mb-8">Masukkan nomor plat kendaraan Anda</p>
                <input type="text" id="inputPlat" placeholder="B 1234 ABC" class="w-full max-w-xs bg-slate-800 border-2 border-slate-700 rounded-2xl px-6 py-4 text-center text-3xl font-black uppercase tracking-widest focus:outline-none focus:border-emerald-500 mb-8 transition-colors">
                <button id="btnProceed" class="w-full max-w-xs bg-emerald-600 hover:bg-emerald-500 py-4 rounded-2xl font-bold text-lg shadow-lg active:scale-95 transition-all">MASUK SISTEM</button>
            </div>

            <!-- STEP 2: Izin Perangkat -->
            <div id="stepIzin" class="overlay-step hidden">
                <div class="mb-6 p-4 bg-blue-500/10 rounded-full text-blue-400">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
                </div>
                <h2 class="text-2xl font-bold mb-2 text-white">Izin Diperlukan</h2>
                <p class="text-slate-400 text-sm mb-8">Izinkan akses Kamera & GPS untuk melanjutkan</p>
                <button id="btnStartApp" class="bg-blue-600 hover:bg-blue-500 px-16 py-4 rounded-2xl font-bold text-lg shadow-lg active:scale-95 transition-all">AKTIFKAN SEKARANG</button>
            </div>

            <video id="videoFeed" autoplay playsinline></video>
            <div id="previewContainer" class="absolute inset-0 hidden bg-black">
                <img id="resultImage" class="w-full h-full object-contain" src="" alt="Captured">
            </div>
            
            <!-- Info Watermark (Overlay Tampilan) -->
            <div class="absolute bottom-4 left-4 right-4 bg-slate-900/80 backdrop-blur-md p-3 rounded-xl text-[11px] pointer-events-none border border-white/5 shadow-2xl">
                <div class="flex items-center gap-2 mb-2">
                    <span id="gpsStatusDot" class="status-dot bg-red-500"></span>
                    <span id="gpsStatusText" class="uppercase font-bold text-white tracking-tighter">GPS: MENCARI...</span>
                    <span class="ml-auto bg-emerald-500 text-slate-900 px-2 py-0.5 rounded font-black" id="displayPlat">--</span>
                </div>
                <div id="addressDisplay" class="text-slate-300 leading-snug font-medium italic">Menghubungkan ke satelit alamat...</div>
            </div>
        </div>

        <!-- Tombol Utama -->
        <div id="controlsGroup" class="flex flex-wrap justify-center gap-4 opacity-30 pointer-events-none transition-all duration-700">
            <button id="btnCapture" class="bg-blue-600 hover:bg-blue-700 px-12 py-5 rounded-full font-black flex items-center gap-3 shadow-xl active:scale-95 transform transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>
                AMBIL FOTO
            </button>
            <button id="btnRetake" class="hidden bg-slate-700 hover:bg-slate-600 px-10 py-5 rounded-full font-bold shadow-lg">ULANGI</button>
            <button id="btnSend" class="hidden bg-emerald-600 hover:bg-emerald-700 px-10 py-5 rounded-full font-black flex items-center gap-3 shadow-xl animate-pulse">
                SIMPAN KE DRIVE
            </button>
        </div>

        <!-- Log Sistem Mini -->
        <div class="bg-slate-800/50 rounded-2xl p-4 text-[11px] font-mono border border-slate-700/50">
            <div id="logEntries" class="space-y-1 h-24 overflow-y-auto text-blue-400 scroll-smooth">
                <div>> Menunggu input nomor plat kendaraan...</div>
            </div>
        </div>
    </main>

    <canvas id="capturedCanvas"></canvas>

    <div id="modal" class="fixed inset-0 bg-black/95 hidden items-center justify-center p-6 z-[100]">
        <div class="bg-slate-800 p-10 rounded-[2rem] max-w-sm w-full text-center border border-slate-700 shadow-[0_0_50px_rgba(0,0,0,0.5)]">
            <div id="modalIcon" class="mb-6 text-7xl">✅</div>
            <h3 id="modalTitle" class="text-2xl font-black mb-3">Status</h3>
            <p id="modalMsg" class="text-slate-400 mb-10 text-sm leading-relaxed"></p>
            <button onclick="closeModal()" class="w-full bg-blue-600 hover:bg-blue-500 py-5 rounded-2xl font-bold text-lg shadow-xl active:scale-95 transition-all">TUTUP</button>
        </div>
    </div>

    <script>
        // MASUKKAN URL GOOGLE APPS SCRIPT ANDA DI SINI
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxI4RdgBbe-we7vhdoST7w2DsgZ94S1Vua2SBpOodMI1WvA88u-sXpHW474yLAltyLs/exec"; 

        const video = document.getElementById('videoFeed');
        const canvas = document.getElementById('capturedCanvas');
        const resultImg = document.getElementById('resultImage');
        const previewContainer = document.getElementById('previewContainer');
        const logEntries = document.getElementById('logEntries');
        const addressDisplay = document.getElementById('addressDisplay');
        const gpsStatusDot = document.getElementById('gpsStatusDot');
        const gpsStatusText = document.getElementById('gpsStatusText');
        const stepLogin = document.getElementById('stepLogin');
        const stepIzin = document.getElementById('stepIzin');
        const controlsGroup = document.getElementById('controlsGroup');

        let currentCoords = { lat: 0, lng: 0, accuracy: 0 };
        let fullAddress = "";
        let nomorPlat = "";
        let stream = null;

        function addLog(msg, type = 'info') {
            const entry = document.createElement('div');
            entry.className = type === 'error' ? 'text-red-400' : (type === 'success' ? 'text-emerald-400' : 'text-blue-300');
            entry.textContent = `> ${msg}`;
            logEntries.prepend(entry);
        }

        document.getElementById('btnProceed').onclick = () => {
            const val = document.getElementById('inputPlat').value.trim();
            if (!val) return showModal('⚠️', 'Input Kosong', 'Harap masukkan Nomor Plat kendaraan.');
            nomorPlat = val.toUpperCase();
            document.getElementById('displayPlat').textContent = nomorPlat;
            stepLogin.style.display = 'none';
            stepIzin.classList.remove('hidden');
            addLog(`Nomor Plat dikunci: ${nomorPlat}`);
        };

        document.getElementById('btnStartApp').onclick = async () => {
            addLog('Menginisialisasi perangkat keras...');
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: { ideal: 'environment' } }, 
                    audio: false 
                });
                video.srcObject = stream;
                
                const track = stream.getVideoTracks()[0];
                if (track.getSettings().facingMode === 'user') video.classList.add('mirror');

                initGPS();
                stepIzin.style.display = 'none';
                controlsGroup.classList.remove('opacity-30', 'pointer-events-none');
                addLog('Kamera & GPS berhasil dihubungkan.', 'success');
            } catch (err) {
                showModal('❌', 'Akses Gagal', 'Browser menolak izin kamera. Silakan cek pengaturan privasi browser Anda.');
            }
        };

        function initGPS() {
            if (!navigator.geolocation) return addLog('GPS tidak didukung browser ini.', 'error');
            navigator.geolocation.watchPosition(async (pos) => {
                currentCoords = {
                    lat: pos.coords.latitude,
                    lng: pos.coords.longitude,
                    accuracy: pos.coords.accuracy.toFixed(1)
                };
                gpsStatusDot.className = 'status-dot bg-emerald-500 shadow-[0_0_15px_rgba(16,185,129,0.7)]';
                gpsStatusText.textContent = `GPS: AKTIF (${currentCoords.accuracy}m)`;
                fetchAddress(currentCoords.lat, currentCoords.lng);
            }, (err) => {
                addLog('GPS Terputus: ' + err.message, 'warning');
                gpsStatusDot.className = 'status-dot bg-red-500';
            }, { enableHighAccuracy: true });
        }

        async function fetchAddress(lat, lng) {
            try {
                // Gunakan Nominatim dengan user-agent sederhana
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=18&addressdetails=1`);
                const data = await res.json();
                
                if (data && data.address) {
                    const a = data.address;
                    const parts = [
                        a.road || a.pedestrian,
                        a.village || a.suburb || a.hamlet,
                        a.city_district || a.county,
                        a.city || a.regency
                    ].filter(Boolean);
                    
                    fullAddress = parts.join(', ');
                    addressDisplay.textContent = fullAddress || `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
                } else {
                    throw new Error();
                }
            } catch (e) {
                // Fallback jika API alamat sibuk
                fullAddress = `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
                addressDisplay.textContent = `${fullAddress} (Layanan alamat sibuk)`;
            }
        }

        document.getElementById('btnCapture').onclick = () => {
            const w = video.videoWidth;
            const h = video.videoHeight;
            canvas.width = w;
            canvas.height = h;
            const ctx = canvas.getContext('2d');
            
            if (video.classList.contains('mirror')) { ctx.translate(w, 0); ctx.scale(-1, 1); }
            ctx.drawImage(video, 0, 0, w, h);
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            
            const fontSize = Math.max(18, Math.floor(w / 30));
            ctx.font = `bold ${fontSize}px sans-serif`;
            
            const ts = new Date().toLocaleString('id-ID', { dateStyle: 'medium', timeStyle: 'medium' });
            const lines = [
                `PLAT   : ${nomorPlat}`,
                `LOKASI : ${fullAddress}`,
                `WAKTU  : ${ts}`,
                `KOORD  : ${currentCoords.lat.toFixed(6)}, ${currentCoords.lng.toFixed(6)}`
            ];

            ctx.fillStyle = 'rgba(15, 23, 42, 0.85)';
            const padding = 35;
            const boxH = (lines.length * (fontSize + 14)) + (padding * 1.5);
            ctx.fillRect(0, h - boxH, w, boxH);
            
            ctx.fillStyle = '#10b981';
            ctx.fillRect(0, h - boxH, 12, boxH);
            
            ctx.fillStyle = '#ffffff';
            lines.forEach((l, i) => ctx.fillText(l, padding, h - boxH + padding + (i * (fontSize + 14)) + fontSize/2));

            resultImg.src = canvas.toDataURL('image/jpeg', 0.85);
            previewContainer.classList.remove('hidden');
            document.getElementById('btnCapture').classList.add('hidden');
            document.getElementById('btnRetake').classList.remove('hidden');
            document.getElementById('btnSend').classList.remove('hidden');
            addLog('Foto berhasil ditangkap.');
        };

        document.getElementById('btnRetake').onclick = () => {
            previewContainer.classList.add('hidden');
            document.getElementById('btnCapture').classList.remove('hidden');
            document.getElementById('btnRetake').classList.add('hidden');
            document.getElementById('btnSend').classList.add('hidden');
            addLog('Siap mengambil foto baru.');
        };

        document.getElementById('btnSend').onclick = async () => {
            const btn = document.getElementById('btnSend');
            btn.disabled = true;
            btn.innerHTML = '<span class="animate-pulse">Menyimpan...</span>';
            addLog('Mengunggah ke sistem Google Cloud...');

            const imgBase64 = resultImg.src.split(',')[1];
            
            try {
                // Pengiriman data menggunakan mode no-cors
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({
                        plat: nomorPlat,
                        address: fullAddress,
                        lat: currentCoords.lat,
                        lng: currentCoords.lng,
                        image: imgBase64,
                        timestamp: new Date().toLocaleString('id-ID').replace(/\//g, '-')
                    })
                });

                showModal('✅', 'Tersimpan!', `Data kendaraan ${nomorPlat} telah berhasil diamankan di Google Drive & Sheets.`);
                document.getElementById('btnRetake').click();
                addLog('Data berhasil disinkronisasi.', 'success');
            } catch (err) {
                showModal('❌', 'Gangguan', 'Gagal mengirim data. Periksa koneksi internet Anda.');
                addLog('Gagal sinkronisasi.', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'SIMPAN KE DRIVE';
            }
        };

        function showModal(icon, title, msg) {
            document.getElementById('modalIcon').textContent = icon;
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalMsg').textContent = msg;
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('modal').classList.add('flex');
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
            document.getElementById('modal').classList.remove('flex');
        }
    </script>
</body>
</html>
