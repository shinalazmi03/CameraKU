<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PT. Hutahaean Dalu Dalu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIkdQUyBDYW0gUHJvIiwKICAic2hvcnRfbmFtZSI6ICJHUFNDYW0iLAogICJzdGFydF91cmwiOiAiLiIsCiAgImRpc3BsYXkiOiAic3RhbmRhbG9uZSIsCiAgImJhY2tncm91bmRfY29sb3IiOiAiIzAyMDYxNyIsCiAgInRoZW1lX2NvbG9yIjogIiMwMjA2MTciCn0=">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@500&display=swap');
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: #f8fafc; }
        .mono { font-family: 'JetBrains Mono', monospace; }

        .app-container {
            width: 100%;
            max-width: 500px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            margin: 0 auto;
        }

        .preview-box {
            position: relative;
            width: 100%;
            aspect-ratio: 3/4;
            background: #0f172a;
            border-radius: 2.5rem;
            overflow: hidden;
            border: 2px solid #1e293b;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        #resultImage {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .overlay-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 1.5rem;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            pointer-events: none;
            z-index: 30;
        }

        .btn-action {
            width: 100%;
            max-width: 320px;
            padding: 1.25rem;
            border-radius: 1.5rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
        }

        .btn-camera { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); }
        .btn-send { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }
        .btn-retake { background: #1e293b; color: #94a3b8; }

        .step-overlay {
            position: fixed;
            inset: 0;
            background: #020617;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
        }

        #cameraTrigger { display: none; }
        #procCanvas { display: none; }
    </style>
</head>
<body>

    <div class="app-container">
        
        <!-- LAYAR LOGIN -->
        <div id="stepLogin" class="step-overlay">
            <div class="w-24 h-24 mb-8 bg-blue-500/10 rounded-[2.5rem] flex items-center justify-center text-blue-500">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
            </div>
            <h1 class="text-3xl font-black mb-2 tracking-tighter uppercase">No Polisi Kendaraan</h1>
            <p class="text-slate-500 text-sm mb-10 text-center">Masukkan nomor plat unit untuk mencetak keterangan pada foto</p>
            
            <input type="text" id="inputPlat" placeholder="B 1234 ABC" 
                   class="w-full max-w-xs bg-slate-900 border-2 border-slate-800 rounded-2xl px-6 py-5 text-center text-3xl font-black uppercase focus:border-blue-500 transition-all mb-8 text-white outline-none">
            
            <button id="btnProceed" class="btn-action btn-camera text-white shadow-xl shadow-blue-500/20">
                BUKA KAMERA
            </button>
        </div>

        <header class="mb-6 text-center">
            <h2 class="text-2xl font-black italic tracking-tighter bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent">
                GPS CAM PRO
            </h2>
            <div class="flex items-center justify-center gap-2 mt-1">
                <span id="gpsDot" class="h-2 w-2 rounded-full bg-red-500 animate-pulse"></span>
                <span id="gpsText" class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">GPS Sedang Mencari...</span>
            </div>
        </header>

        <!-- KOTAK PREVIEW -->
        <div class="preview-box mb-8">
            <div id="cameraIcon" class="text-slate-800">
                <svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
            </div>
            
            <!-- Hasil foto yang ditampilkan (sudah diproses dengan watermark) -->
            <img id="resultImage" class="hidden" src="" alt="Hasil Foto">
            
            <!-- Watermark tampilan di web -->
            <div id="appWatermark" class="overlay-info hidden">
                <div class="flex items-center gap-3 mb-2">
                    <div class="h-10 w-1 bg-emerald-500 rounded-full shadow-[0_0_10px_#10b981]"></div>
                    <div class="flex flex-col">
                        <span id="displayPlat" class="bg-emerald-500 text-slate-950 px-2.5 py-0.5 rounded font-black text-[12px] w-fit tracking-widest mb-0.5">--</span>
                        <span class="text-slate-400 text-[10px] font-bold uppercase tracking-wider italic">Lokasi Pelaporan</span>
                    </div>
                </div>
                <div class="space-y-0.5">
                    <p id="addrText" class="text-white text-[13px] font-bold leading-tight italic">Mendapatkan alamat...</p>
                    <p id="timeText" class="text-slate-300 text-[11px] font-medium mono">--:--:--</p>
                </div>
            </div>
        </div>

        <!-- KONTROL UTAMA -->
        <div class="w-full flex flex-col items-center gap-4">
            <input type="file" accept="image/*" capture="camera" id="cameraTrigger">
            
            <button id="btnOpenCam" class="btn-action btn-camera text-white shadow-xl shadow-blue-500/20">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
                AMBIL FOTO BAGUS
            </button>

            <div id="postCapture" class="hidden w-full flex flex-col items-center gap-4">
                <button id="btnSend" class="btn-action btn-send text-white shadow-xl shadow-emerald-500/20">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    SIMPAN KE CLOUD & HP
                </button>
                <button id="btnRetake" class="btn-action btn-retake">
                    AMBIL ULANG
                </button>
            </div>
        </div>
    </div>

    <!-- Hidden Canvas untuk pengolahan watermark permanen -->
    <canvas id="procCanvas"></canvas>

    <!-- MODAL STATUS -->
    <div id="modal" class="fixed inset-0 bg-black/95 hidden items-center justify-center p-6 z-[200]">
        <div class="bg-slate-900 border border-slate-800 p-10 rounded-[3rem] max-w-sm w-full text-center shadow-2xl">
            <div id="modalIcon" class="mb-4 text-6xl">✅</div>
            <h3 id="modalTitle" class="text-xl font-bold mb-2 uppercase">Selesai</h3>
            <p id="modalMsg" class="text-slate-500 text-sm mb-10 leading-relaxed"></p>
            <button onclick="location.reload()" class="w-full bg-emerald-600 py-5 rounded-2xl font-bold text-white uppercase tracking-widest shadow-lg">Tutup</button>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbywUWR4cdbbccCXETV026CvOIPYO4YmA_k32l9WBUotQjzIDpn2LcwP0VjbC4BnWR8g/exec"; 

        const cameraTrigger = document.getElementById('cameraTrigger');
        const resultImg = document.getElementById('resultImage');
        const canvas = document.getElementById('procCanvas');
        const addrText = document.getElementById('addrText');
        const timeText = document.getElementById('timeText');
        const gpsDot = document.getElementById('gpsDot');
        const gpsText = document.getElementById('gpsText');
        
        let currentCoords = { lat: 0, lng: 0 };
        let fullAddress = "";
        let nomorPlat = "";

        // --- LOGIN & GPS ---
        document.getElementById('btnProceed').onclick = () => {
            const val = document.getElementById('inputPlat').value.trim();
            if (!val) return alert("Masukkan nomor plat unit!");
            nomorPlat = val.toUpperCase();
            document.getElementById('displayPlat').textContent = nomorPlat;
            document.getElementById('stepLogin').style.display = 'none';
            initGPS();
        };

        function initGPS() {
            navigator.geolocation.watchPosition((pos) => {
                currentCoords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                gpsDot.className = 'h-2 w-2 rounded-full bg-emerald-500 shadow-[0_0_8px_#10b981]';
                gpsText.textContent = `GPS Terkunci (${pos.coords.accuracy.toFixed(1)}m)`;
                gpsText.classList.replace('text-slate-500', 'text-emerald-500');
                fetchAddress(currentCoords.lat, currentCoords.lng);
            }, null, { enableHighAccuracy: true });
        }

        async function fetchAddress(lat, lng) {
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=18&addressdetails=1&accept-language=id`);
                const data = await res.json();
                if (data && data.address) {
                    const a = data.address;
                    // Prioritas: Jalan -> Desa -> Kabupaten -> Provinsi
                    const parts = [
                        a.road || a.pedestrian || a.path || "",
                        a.village || a.suburb || a.hamlet || a.town || "",
                        a.city || a.regency || a.county || "",
                        a.state || ""
                    ].filter(Boolean);
                    fullAddress = parts.join(', ');
                    addrText.textContent = fullAddress || `${lat.toFixed(6)}, ${lng.toFixed(6)}`;
                }
            } catch (e) {
                fullAddress = `${lat.toFixed(6)}, ${lng.toFixed(6)}`;
                addrText.textContent = fullAddress;
            }
        }

        // --- CAMERA TRIGGER ---
        document.getElementById('btnOpenCam').onclick = () => cameraTrigger.click();

        cameraTrigger.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    // PROSES WATERMARK KE CANVAS (DICETAK PERMANEN PADA GAMBAR)
                    canvas.width = img.width;
                    canvas.height = img.height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);
                    
                    // Ukuran font proporsional dengan resolusi foto
                    const fontSize = Math.max(32, Math.floor(canvas.width / 25));
                    ctx.font = `bold ${fontSize}px sans-serif`;
                    
                    const ts = new Date().toLocaleString('id-ID', { dateStyle: 'medium', timeStyle: 'medium' });
                    const lines = [
                        `UNIT  : ${nomorPlat}`,
                        `LOC   : ${fullAddress}`,
                        `TIME  : ${ts}`,
                        `COORD : ${currentCoords.lat.toFixed(6)}, ${currentCoords.lng.toFixed(6)}`
                    ];

                    const padding = canvas.width * 0.05;
                    const boxHeight = (lines.length * (fontSize + 24)) + (padding * 1.5);
                    
                    // Background Watermark Gelap di Bawah Foto
                    const grad = ctx.createLinearGradient(0, canvas.height - boxHeight, 0, canvas.height);
                    grad.addColorStop(0, 'transparent');
                    grad.addColorStop(0.3, 'rgba(0,0,0,0.8)');
                    grad.addColorStop(1, 'rgba(0,0,0,0.95)');
                    ctx.fillStyle = grad;
                    ctx.fillRect(0, canvas.height - boxHeight, canvas.width, boxHeight);
                    
                    // Aksen Garis Hijau di Samping Teks
                    ctx.fillStyle = '#10b981';
                    ctx.fillRect(0, canvas.height - boxHeight + padding, canvas.width * 0.012, boxHeight - (padding * 2));
                    
                    // Cetak Teks ke Gambar
                    ctx.fillStyle = '#ffffff';
                    lines.forEach((l, i) => {
                        ctx.fillText(l, padding + (canvas.width * 0.03), canvas.height - boxHeight + padding + (i * (fontSize + 24)) + fontSize);
                    });

                    // Update Image Preview dengan hasil olahan canvas
                    const finalDataUrl = canvas.toDataURL('image/jpeg', 0.9);
                    resultImg.src = finalDataUrl;
                    resultImg.classList.remove('hidden');
                    
                    document.getElementById('cameraIcon').classList.add('hidden');
                    document.getElementById('appWatermark').classList.remove('hidden');
                    document.getElementById('btnOpenCam').classList.add('hidden');
                    document.getElementById('postCapture').classList.remove('hidden');
                    timeText.textContent = ts;
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        };

        document.getElementById('btnRetake').onclick = () => {
            resultImg.classList.add('hidden');
            document.getElementById('cameraIcon').classList.remove('hidden');
            document.getElementById('appWatermark').classList.add('hidden');
            document.getElementById('btnOpenCam').classList.remove('hidden');
            document.getElementById('postCapture').classList.add('hidden');
            cameraTrigger.value = "";
        };

        // --- SIMPAN & DOWNLOAD ---
        document.getElementById('btnSend').onclick = async () => {
            const btn = document.getElementById('btnSend');
            btn.disabled = true;
            btn.innerHTML = 'MENYIMPAN...';

            // 1. Download Lokal (Foto SUDAH ADA watermark keterangannya)
            const link = document.createElement('a');
            const fileTs = new Date().getTime();
            link.download = `${nomorPlat}_LOC_${fileTs}.jpg`;
            link.href = resultImg.src;
            link.click();

            // 2. Kirim ke Google Cloud (Drive & Sheets)
            const imgBase = resultImg.src.split(',')[1];
            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({
                        plat: nomorPlat,
                        name: "Ricky Yusuf Saputra",
                        address: fullAddress,
                        lat: currentCoords.lat,
                        lng: currentCoords.lng,
                        image: imgBase,
                        timestamp: new Date().toLocaleString('id-ID').replace(/\//g, '-')
                    })
                });
                
                document.getElementById('modalMsg').textContent = `Laporan unit ${nomorPlat} telah berhasil disimpan di HP dan Google Drive lengkap dengan keterangan lokasi.`;
                document.getElementById('modal').classList.remove('hidden');
                document.getElementById('modal').classList.add('flex');
            } catch (err) {
                alert("Simpan galeri berhasil, namun sinkronisasi ke Google Drive gagal.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'SIMPAN KE CLOUD & HP';
            }
        };

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
            document.getElementById('modal').classList.remove('flex');
        }
    </script>
</body>
</html>
